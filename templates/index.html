<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kova</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
</head>
<body>

<button class="mobile-toggle" onclick="toggleSidebar()">&#9776;</button>

<div class="drop-overlay" id="drop-overlay">Drop file to upload</div>

<div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-header-row">
                <div>
                    <h1>Kova</h1>
                    <p>Personal AI Agent</p>
                </div>
                <button class="sidebar-close" onclick="toggleSidebar()">&times;</button>
            </div>
        </div>

        <div class="sidebar-tabs">
            <button class="sidebar-tab active" data-panel="stats" onclick="switchTab(this)">Stats</button>
            <button class="sidebar-tab" data-panel="memory" onclick="switchTab(this)">Memory</button>
            <button class="sidebar-tab" data-panel="files" onclick="switchTab(this)">Files</button>
            <button class="sidebar-tab" data-panel="tools" onclick="switchTab(this)">Tools</button>
        </div>

        <div class="sidebar-content">
            <!-- Stats panel -->
            <div class="sidebar-panel active" id="panel-stats">
                <div class="stat-grid">
                    <div class="stat-card">
                        <div class="label">Your Messages</div>
                        <div class="value" id="stat-user-msgs">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Kova Replies</div>
                        <div class="value" id="stat-assistant-msgs">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Facts Stored</div>
                        <div class="value" id="stat-facts">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Reminders</div>
                        <div class="value" id="stat-reminders">-</div>
                    </div>
                </div>
                <div class="tool-usage" id="tool-usage"></div>
            </div>

            <!-- Memory panel -->
            <div class="sidebar-panel" id="panel-memory">
                <div id="memory-list"></div>
            </div>

            <!-- Files panel -->
            <div class="sidebar-panel" id="panel-files">
                <div id="files-list"></div>
            </div>

            <!-- Tools panel -->
            <div class="sidebar-panel" id="panel-tools">
                <div class="section-header">
                    <h3>Built-in Tools</h3>
                </div>
                <div id="tools-list"></div>

                <div class="section-header">
                    <h3>Custom Commands</h3>
                    <button class="btn-sm" onclick="showCommandForm()">+ Add</button>
                </div>
                <div id="command-form-container"></div>
                <div id="commands-list"></div>
            </div>
        </div>
    </aside>

    <!-- Main chat area -->
    <main class="main">
        <div class="chat-container" id="chat-container"></div>

        <div class="typing-indicator" id="typing-indicator">
            <span></span><span></span><span></span>
        </div>

        <div class="input-area">
            <div class="input-row">
                <input type="file" id="file-input" onchange="handleFileSelect(event)">
                <button class="btn btn-icon" onclick="document.getElementById('file-input').click()" title="Upload file">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
                </button>
                <textarea id="message-input" placeholder="Message Kova..." rows="1" onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
                <button class="btn btn-primary" id="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </main>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const typingIndicator = document.getElementById('typing-indicator');

    // Configure marked
    marked.setOptions({
        breaks: true,
        gfm: true,
    });

    // --- Chat ---

    function addMessage(role, content, files) {
        const div = document.createElement('div');
        div.className = `message ${role}`;

        if (role === 'assistant') {
            div.innerHTML = DOMPurify.sanitize(marked.parse(content));
        } else {
            div.textContent = content;
        }

        // Add file download links
        if (files && files.length > 0) {
            files.forEach(f => {
                const link = document.createElement('a');
                link.href = `/api/files/${f.id}`;
                link.className = 'file-link';
                link.textContent = `📎 ${f.filename}`;
                link.download = f.filename;
                div.appendChild(link);
            });
        }

        chatContainer.appendChild(div);
        scrollToBottom();
    }

    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function setLoading(loading) {
        sendBtn.disabled = loading;
        messageInput.disabled = loading;
        typingIndicator.classList.toggle('visible', loading);
        if (loading) scrollToBottom();
    }

    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;

        addMessage('user', text);
        messageInput.value = '';
        messageInput.style.height = 'auto';
        setLoading(true);

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text }),
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.detail || 'Request failed');
            }

            const data = await res.json();
            addMessage('assistant', data.reply, data.files);
            refreshSidebar();
        } catch (e) {
            addMessage('assistant', `Error: ${e.message}`);
        } finally {
            setLoading(false);
            messageInput.focus();
        }
    }

    function handleKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 160) + 'px';
    }

    // --- File Upload ---

    async function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        await uploadFile(file);
        event.target.value = '';
    }

    async function uploadFile(file) {
        addMessage('user', `📎 ${file.name}`);
        setLoading(true);

        try {
            const formData = new FormData();
            formData.append('file', file);

            const res = await fetch('/api/upload', {
                method: 'POST',
                body: formData,
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.detail || 'Upload failed');
            }

            const data = await res.json();
            addMessage('assistant', data.reply, data.files);
            refreshSidebar();
        } catch (e) {
            addMessage('assistant', `Error uploading file: ${e.message}`);
        } finally {
            setLoading(false);
        }
    }

    // Drag and drop
    let dragCounter = 0;
    const dropOverlay = document.getElementById('drop-overlay');

    document.addEventListener('dragenter', (e) => {
        e.preventDefault();
        dragCounter++;
        dropOverlay.classList.add('visible');
    });

    document.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dragCounter--;
        if (dragCounter === 0) dropOverlay.classList.remove('visible');
    });

    document.addEventListener('dragover', (e) => e.preventDefault());

    document.addEventListener('drop', (e) => {
        e.preventDefault();
        dragCounter = 0;
        dropOverlay.classList.remove('visible');
        if (e.dataTransfer.files.length > 0) {
            uploadFile(e.dataTransfer.files[0]);
        }
    });

    // --- Sidebar ---

    function switchTab(btn) {
        document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`panel-${btn.dataset.panel}`).classList.add('active');
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
    }

    async function refreshSidebar() {
        loadStats();
        loadMemory();
        loadFiles();
        loadTools();
        loadCommands();
    }

    async function loadStats() {
        try {
            const res = await fetch('/api/stats');
            const data = await res.json();
            document.getElementById('stat-user-msgs').textContent = data.user_messages ?? '-';
            document.getElementById('stat-assistant-msgs').textContent = data.assistant_messages ?? '-';
            document.getElementById('stat-facts').textContent = data.facts_stored ?? '-';
            document.getElementById('stat-reminders').textContent = data.active_reminders ?? '-';

            const toolDiv = document.getElementById('tool-usage');
            if (data.tool_calls && data.tool_calls.length > 0) {
                toolDiv.innerHTML = '<h3>Tool Usage</h3>' +
                    data.tool_calls.map(t => `<div class="tool-item"><span>${t.tool_name}</span><span>${t.cnt}</span></div>`).join('');
            } else {
                toolDiv.innerHTML = '';
            }
        } catch (e) {
            console.error('Failed to load stats:', e);
        }
    }

    async function loadMemory() {
        try {
            const res = await fetch('/api/memory');
            const data = await res.json();
            const list = document.getElementById('memory-list');
            if (!data.facts || data.facts.length === 0) {
                list.innerHTML = '<p style="color:var(--text-dim);font-size:0.85rem;">No facts stored yet.</p>';
                return;
            }
            list.innerHTML = data.facts.map(f =>
                `<div class="fact-item">
                    <div class="fact-category">${f.category}</div>
                    <div class="fact-key">${f.key}</div>
                    <div class="fact-value">${f.value}</div>
                </div>`
            ).join('');
        } catch (e) {
            console.error('Failed to load memory:', e);
        }
    }

    async function loadFiles() {
        try {
            const res = await fetch('/api/files');
            const data = await res.json();
            const list = document.getElementById('files-list');
            if (!data.files || data.files.length === 0) {
                list.innerHTML = '<p style="color:var(--text-dim);font-size:0.85rem;">No files yet.</p>';
                return;
            }
            list.innerHTML = data.files.map(f =>
                `<div class="file-item">
                    <a href="/api/files/${f.id}" download>${f.filename}</a>
                    <span class="file-meta">${f.source} &middot; ${f.created_at ? f.created_at.slice(0, 10) : ''}</span>
                </div>`
            ).join('');
        } catch (e) {
            console.error('Failed to load files:', e);
        }
    }

    // --- Load history on page load ---

    async function loadHistory() {
        try {
            const res = await fetch('/api/history?limit=50');
            const data = await res.json();
            if (data.messages && data.messages.length > 0) {
                data.messages.forEach(m => addMessage(m.role, m.content));
            } else {
                chatContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">&#128172;</div>
                        <p>Send a message to start chatting with Kova</p>
                    </div>`;
            }
        } catch (e) {
            console.error('Failed to load history:', e);
        }
    }

    // --- Tools ---

    async function loadTools() {
        try {
            const res = await fetch('/api/tools');
            const data = await res.json();
            const list = document.getElementById('tools-list');
            if (!data.tools || data.tools.length === 0) {
                list.innerHTML = '<p style="color:var(--text-dim);font-size:0.85rem;">No tools available.</p>';
                return;
            }
            list.innerHTML = data.tools.map(t => {
                const disabled = !t.enabled ? ' disabled' : '';
                const checked = t.enabled ? ' checked' : '';
                const desc = t.description_override || t.description;
                const isOverridden = !!t.description_override;
                const params = t.parameters.map(p => `<span class="param-badge">${escHtml(p)}</span>`).join('');
                return `<div class="tool-card${disabled}">
                    <div class="tool-card-header">
                        <label class="toggle-switch">
                            <input type="checkbox"${checked} onchange="toggleTool('${escHtml(t.name)}', this.checked)">
                            <span class="toggle-slider"></span>
                        </label>
                        <span class="tool-name">${escHtml(t.name)}</span>
                    </div>
                    <textarea class="tool-desc-area" rows="2"
                        data-tool="${escHtml(t.name)}"
                        data-default="${escHtml(t.description)}"
                        onblur="saveToolDesc(this)">${escHtml(desc)}</textarea>
                    ${params ? '<div class="tool-params">' + params + '</div>' : ''}
                    ${isOverridden ? '<div class="tool-actions"><button class="btn-xs" onclick="resetToolDesc(\'' + escHtml(t.name) + '\')">Reset to default</button></div>' : ''}
                </div>`;
            }).join('');
        } catch (e) {
            console.error('Failed to load tools:', e);
        }
    }

    function escHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    async function toggleTool(name, enabled) {
        try {
            await fetch(`/api/tools/${name}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled }),
            });
            loadTools();
        } catch (e) {
            console.error('Failed to toggle tool:', e);
        }
    }

    async function saveToolDesc(textarea) {
        const name = textarea.dataset.tool;
        const defaultDesc = textarea.dataset.default;
        const value = textarea.value.trim();
        // Only save if different from default
        const override = (value && value !== defaultDesc) ? value : '';
        try {
            await fetch(`/api/tools/${name}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ description_override: override }),
            });
            loadTools();
        } catch (e) {
            console.error('Failed to save tool description:', e);
        }
    }

    async function resetToolDesc(name) {
        try {
            await fetch(`/api/tools/${name}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reset: true }),
            });
            loadTools();
        } catch (e) {
            console.error('Failed to reset tool:', e);
        }
    }

    // --- Custom Commands ---

    async function loadCommands() {
        try {
            const res = await fetch('/api/commands');
            const data = await res.json();
            const list = document.getElementById('commands-list');
            if (!data.commands || data.commands.length === 0) {
                list.innerHTML = '<p style="color:var(--text-dim);font-size:0.85rem;">No custom commands yet.</p>';
                return;
            }
            list.innerHTML = data.commands.map(c => `<div class="cmd-card">
                <div class="cmd-card-header">
                    <span class="cmd-name">/${escHtml(c.name)}</span>
                    <div class="cmd-actions">
                        <button class="btn-xs" onclick="useCommand(${c.id}, '${escHtml(c.name)}', \`${escHtml(c.prompt_template)}\`)">Use</button>
                        <button class="btn-xs" onclick="editCommand(${c.id})">Edit</button>
                        <button class="btn-xs" onclick="deleteCommand(${c.id})">Del</button>
                    </div>
                </div>
                ${c.description ? '<div class="cmd-desc">' + escHtml(c.description) + '</div>' : ''}
                <div class="cmd-template">${escHtml(c.prompt_template)}</div>
            </div>`).join('');
        } catch (e) {
            console.error('Failed to load commands:', e);
        }
    }

    function showCommandForm(editData) {
        const container = document.getElementById('command-form-container');
        const isEdit = !!editData;
        container.innerHTML = `<div class="cmd-form">
            <label>Name (no spaces)</label>
            <input type="text" id="cmd-name" placeholder="e.g. summarize" value="${editData ? escHtml(editData.name) : ''}">
            <label>Description</label>
            <input type="text" id="cmd-desc" placeholder="What this command does" value="${editData ? escHtml(editData.description) : ''}">
            <label>Prompt Template (use {input} for user input)</label>
            <textarea id="cmd-template" placeholder="e.g. Summarize this: {input}">${editData ? escHtml(editData.prompt_template) : ''}</textarea>
            <div class="cmd-form-actions">
                <button class="btn-sm" onclick="saveCommand(${editData ? editData.id : 'null'})">${isEdit ? 'Update' : 'Create'}</button>
                <button class="btn-sm danger" onclick="hideCommandForm()">Cancel</button>
            </div>
        </div>`;
    }

    function hideCommandForm() {
        document.getElementById('command-form-container').innerHTML = '';
    }

    async function saveCommand(editId) {
        const name = document.getElementById('cmd-name').value.trim();
        const description = document.getElementById('cmd-desc').value.trim();
        const prompt_template = document.getElementById('cmd-template').value.trim();

        if (!name || !prompt_template) {
            alert('Name and prompt template are required.');
            return;
        }

        try {
            const url = editId ? `/api/commands/${editId}` : '/api/commands';
            const method = editId ? 'PUT' : 'POST';
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, description, prompt_template }),
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                alert(err.detail || 'Failed to save command');
                return;
            }
            hideCommandForm();
            loadCommands();
        } catch (e) {
            console.error('Failed to save command:', e);
        }
    }

    async function editCommand(id) {
        try {
            const res = await fetch('/api/commands');
            const data = await res.json();
            const cmd = data.commands.find(c => c.id === id);
            if (cmd) showCommandForm(cmd);
        } catch (e) {
            console.error('Failed to load command for edit:', e);
        }
    }

    async function deleteCommand(id) {
        if (!confirm('Delete this command?')) return;
        try {
            await fetch(`/api/commands/${id}`, { method: 'DELETE' });
            loadCommands();
        } catch (e) {
            console.error('Failed to delete command:', e);
        }
    }

    function useCommand(id, name, template) {
        if (template.includes('{input}')) {
            messageInput.value = `/${name} `;
            messageInput.focus();
        } else {
            messageInput.value = `/${name}`;
            sendMessage();
        }
    }

    // Init
    loadHistory();
    refreshSidebar();

    // Auto-refresh sidebar every 30s
    setInterval(refreshSidebar, 30000);
</script>

</body>
</html>
