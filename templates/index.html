<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kova</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
</head>
<body>

<button class="mobile-toggle" onclick="toggleSidebar()">&#9776;</button>

<div class="drop-overlay" id="drop-overlay">Drop file to upload</div>

<div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-header-row">
                <div>
                    <h1>Kova</h1>
                    <p>Personal AI Agent</p>
                </div>
                <button class="sidebar-close" onclick="toggleSidebar()">&times;</button>
            </div>
        </div>

        <div class="sidebar-tabs">
            <button class="sidebar-tab active" data-panel="stats" onclick="switchTab(this)">Stats</button>
            <button class="sidebar-tab" data-panel="memory" onclick="switchTab(this)">Memory</button>
            <button class="sidebar-tab" data-panel="files" onclick="switchTab(this)">Files</button>
            <button class="sidebar-tab" data-panel="tools" onclick="switchTab(this)">Tools</button>
        </div>

        <div class="sidebar-content">
            <!-- Stats panel -->
            <div class="sidebar-panel active" id="panel-stats">
                <div class="stat-grid">
                    <div class="stat-card">
                        <div class="label">Your Messages</div>
                        <div class="value" id="stat-user-msgs">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Kova Replies</div>
                        <div class="value" id="stat-assistant-msgs">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Facts Stored</div>
                        <div class="value" id="stat-facts">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Reminders</div>
                        <div class="value" id="stat-reminders">-</div>
                    </div>
                </div>
                <div class="tool-usage" id="tool-usage"></div>
            </div>

            <!-- Memory panel -->
            <div class="sidebar-panel" id="panel-memory">
                <div id="memory-list"></div>
            </div>

            <!-- Files panel -->
            <div class="sidebar-panel" id="panel-files">
                <div id="files-list"></div>
            </div>

            <!-- Tools panel -->
            <div class="sidebar-panel" id="panel-tools">
                <div class="section-header">
                    <h3>Built-in Tools</h3>
                </div>
                <div id="tools-list"></div>

                <div class="section-header">
                    <h3>Custom Tools</h3>
                    <div class="section-header-actions">
                        <button class="btn-sm" onclick="showImportForm()">Import</button>
                        <button class="btn-sm" onclick="showCustomToolForm()">+ Add</button>
                    </div>
                </div>
                <div id="import-form-container"></div>
                <div id="custom-tool-form-container"></div>
                <div id="custom-tools-list"></div>

                <div class="section-header">
                    <h3>Custom Commands</h3>
                    <button class="btn-sm" onclick="showCommandForm()">+ Add</button>
                </div>
                <div id="command-form-container"></div>
                <div id="commands-list"></div>
            </div>
        </div>
    </aside>

    <!-- Main chat area -->
    <main class="main">
        <div class="chat-container" id="chat-container"></div>

        <div class="typing-indicator" id="typing-indicator">
            <span></span><span></span><span></span>
        </div>

        <div class="input-area">
            <div class="input-row">
                <input type="file" id="file-input" onchange="handleFileSelect(event)">
                <button class="btn btn-icon" onclick="document.getElementById('file-input').click()" title="Upload file">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
                </button>
                <textarea id="message-input" placeholder="Message Kova..." rows="1" onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
                <button class="btn btn-primary" id="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </main>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const typingIndicator = document.getElementById('typing-indicator');

    // Configure marked
    marked.setOptions({
        breaks: true,
        gfm: true,
    });

    // --- Chat ---

    function addMessage(role, content, files) {
        const div = document.createElement('div');
        div.className = `message ${role}`;

        if (role === 'assistant') {
            div.innerHTML = DOMPurify.sanitize(marked.parse(content));
        } else {
            div.textContent = content;
        }

        // Add file download links
        if (files && files.length > 0) {
            files.forEach(f => {
                const link = document.createElement('a');
                link.href = `/api/files/${f.id}`;
                link.className = 'file-link';
                link.textContent = `📎 ${f.filename}`;
                link.download = f.filename;
                div.appendChild(link);
            });
        }

        chatContainer.appendChild(div);
        scrollToBottom();
    }

    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function setLoading(loading) {
        sendBtn.disabled = loading;
        messageInput.disabled = loading;
        typingIndicator.classList.toggle('visible', loading);
        if (loading) scrollToBottom();
    }

    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;

        addMessage('user', text);
        messageInput.value = '';
        messageInput.style.height = 'auto';
        setLoading(true);

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text }),
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.detail || 'Request failed');
            }

            const data = await res.json();
            addMessage('assistant', data.reply, data.files);
            refreshSidebar();
        } catch (e) {
            addMessage('assistant', `Error: ${e.message}`);
        } finally {
            setLoading(false);
            messageInput.focus();
        }
    }

    function handleKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 160) + 'px';
    }

    // --- File Upload ---

    async function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        await uploadFile(file);
        event.target.value = '';
    }

    async function uploadFile(file) {
        addMessage('user', `📎 ${file.name}`);
        setLoading(true);

        try {
            const formData = new FormData();
            formData.append('file', file);

            const res = await fetch('/api/upload', {
                method: 'POST',
                body: formData,
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.detail || 'Upload failed');
            }

            const data = await res.json();
            addMessage('assistant', data.reply, data.files);
            refreshSidebar();
        } catch (e) {
            addMessage('assistant', `Error uploading file: ${e.message}`);
        } finally {
            setLoading(false);
        }
    }

    // Drag and drop
    let dragCounter = 0;
    const dropOverlay = document.getElementById('drop-overlay');

    document.addEventListener('dragenter', (e) => {
        e.preventDefault();
        dragCounter++;
        dropOverlay.classList.add('visible');
    });

    document.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dragCounter--;
        if (dragCounter === 0) dropOverlay.classList.remove('visible');
    });

    document.addEventListener('dragover', (e) => e.preventDefault());

    document.addEventListener('drop', (e) => {
        e.preventDefault();
        dragCounter = 0;
        dropOverlay.classList.remove('visible');
        if (e.dataTransfer.files.length > 0) {
            uploadFile(e.dataTransfer.files[0]);
        }
    });

    // --- Sidebar ---

    function switchTab(btn) {
        document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`panel-${btn.dataset.panel}`).classList.add('active');
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
    }

    async function refreshSidebar() {
        loadStats();
        loadMemory();
        loadFiles();
        loadTools();
        loadCustomTools();
        loadCommands();
    }

    async function loadStats() {
        try {
            const res = await fetch('/api/stats');
            const data = await res.json();
            document.getElementById('stat-user-msgs').textContent = data.user_messages ?? '-';
            document.getElementById('stat-assistant-msgs').textContent = data.assistant_messages ?? '-';
            document.getElementById('stat-facts').textContent = data.facts_stored ?? '-';
            document.getElementById('stat-reminders').textContent = data.active_reminders ?? '-';

            const toolDiv = document.getElementById('tool-usage');
            if (data.tool_calls && data.tool_calls.length > 0) {
                toolDiv.innerHTML = '<h3>Tool Usage</h3>' +
                    data.tool_calls.map(t => `<div class="tool-item"><span>${t.tool_name}</span><span>${t.cnt}</span></div>`).join('');
            } else {
                toolDiv.innerHTML = '';
            }
        } catch (e) {
            console.error('Failed to load stats:', e);
        }
    }

    async function loadMemory() {
        try {
            const res = await fetch('/api/memory');
            const data = await res.json();
            const list = document.getElementById('memory-list');
            if (!data.facts || data.facts.length === 0) {
                list.innerHTML = '<p style="color:var(--text-dim);font-size:0.85rem;">No facts stored yet.</p>';
                return;
            }
            list.innerHTML = data.facts.map(f =>
                `<div class="fact-item">
                    <div class="fact-category">${f.category}</div>
                    <div class="fact-key">${f.key}</div>
                    <div class="fact-value">${f.value}</div>
                </div>`
            ).join('');
        } catch (e) {
            console.error('Failed to load memory:', e);
        }
    }

    async function loadFiles() {
        try {
            const res = await fetch('/api/files');
            const data = await res.json();
            const list = document.getElementById('files-list');
            if (!data.files || data.files.length === 0) {
                list.innerHTML = '<p style="color:var(--text-dim);font-size:0.85rem;">No files yet.</p>';
                return;
            }
            list.innerHTML = data.files.map(f =>
                `<div class="file-item">
                    <a href="/api/files/${f.id}" download>${f.filename}</a>
                    <span class="file-meta">${f.source} &middot; ${f.created_at ? f.created_at.slice(0, 10) : ''}</span>
                </div>`
            ).join('');
        } catch (e) {
            console.error('Failed to load files:', e);
        }
    }

    // --- Load history on page load ---

    async function loadHistory() {
        try {
            const res = await fetch('/api/history?limit=50');
            const data = await res.json();
            if (data.messages && data.messages.length > 0) {
                data.messages.forEach(m => addMessage(m.role, m.content));
            } else {
                chatContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">&#128172;</div>
                        <p>Send a message to start chatting with Kova</p>
                    </div>`;
            }
        } catch (e) {
            console.error('Failed to load history:', e);
        }
    }

    // --- Tools ---

    async function loadTools() {
        try {
            const res = await fetch('/api/tools');
            const data = await res.json();
            const list = document.getElementById('tools-list');
            if (!data.tools || data.tools.length === 0) {
                list.innerHTML = '<p style="color:var(--text-dim);font-size:0.85rem;">No tools available.</p>';
                return;
            }
            list.innerHTML = data.tools.map(t => {
                const disabled = !t.enabled ? ' disabled' : '';
                const checked = t.enabled ? ' checked' : '';
                const desc = t.description_override || t.description;
                const isOverridden = !!t.description_override;
                const params = t.parameters.map(p => `<span class="param-badge">${escHtml(p)}</span>`).join('');
                return `<div class="tool-card${disabled}">
                    <div class="tool-card-header">
                        <label class="toggle-switch">
                            <input type="checkbox"${checked} onchange="toggleTool('${escHtml(t.name)}', this.checked)">
                            <span class="toggle-slider"></span>
                        </label>
                        <span class="tool-name">${escHtml(t.name)}</span>
                    </div>
                    <textarea class="tool-desc-area" rows="2"
                        data-tool="${escHtml(t.name)}"
                        data-default="${escHtml(t.description)}"
                        onblur="saveToolDesc(this)">${escHtml(desc)}</textarea>
                    ${params ? '<div class="tool-params">' + params + '</div>' : ''}
                    ${isOverridden ? '<div class="tool-actions"><button class="btn-xs" onclick="resetToolDesc(\'' + escHtml(t.name) + '\')">Reset to default</button></div>' : ''}
                </div>`;
            }).join('');
        } catch (e) {
            console.error('Failed to load tools:', e);
        }
    }

    function escHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    async function toggleTool(name, enabled) {
        try {
            await fetch(`/api/tools/${name}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled }),
            });
            loadTools();
        } catch (e) {
            console.error('Failed to toggle tool:', e);
        }
    }

    async function saveToolDesc(textarea) {
        const name = textarea.dataset.tool;
        const defaultDesc = textarea.dataset.default;
        const value = textarea.value.trim();
        // Only save if different from default
        const override = (value && value !== defaultDesc) ? value : '';
        try {
            await fetch(`/api/tools/${name}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ description_override: override }),
            });
            loadTools();
        } catch (e) {
            console.error('Failed to save tool description:', e);
        }
    }

    async function resetToolDesc(name) {
        try {
            await fetch(`/api/tools/${name}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reset: true }),
            });
            loadTools();
        } catch (e) {
            console.error('Failed to reset tool:', e);
        }
    }

    // --- Custom Tools ---

    async function loadCustomTools() {
        try {
            const res = await fetch('/api/custom-tools');
            const data = await res.json();
            const list = document.getElementById('custom-tools-list');
            if (!data.tools || data.tools.length === 0) {
                list.innerHTML = '<p style="color:var(--text-dim);font-size:0.85rem;">No custom tools yet.</p>';
                return;
            }
            list.innerHTML = data.tools.map(t => {
                const disabledClass = !t.enabled ? ' disabled' : '';
                const checked = t.enabled ? ' checked' : '';
                const params = t.parameters.map(p =>
                    `<span class="param-badge">${escHtml(p.name)}: ${escHtml(p.type)}</span>`
                ).join('');
                return `<div class="custom-tool-card${disabledClass}">
                    <div class="custom-tool-header">
                        <span class="custom-tool-name">${escHtml(t.name)}</span>
                        <div class="custom-tool-actions">
                            <label class="toggle-switch">
                                <input type="checkbox"${checked} onchange="toggleCustomTool(${t.id}, this.checked)">
                                <span class="toggle-slider"></span>
                            </label>
                            <button class="btn-xs" onclick="editCustomTool(${t.id})">Edit</button>
                            <button class="btn-xs" onclick="deleteCustomTool(${t.id})">Del</button>
                        </div>
                    </div>
                    <div class="custom-tool-desc">${escHtml(t.description)}</div>
                    ${params ? '<div class="tool-params">' + params + '</div>' : ''}
                </div>`;
            }).join('');
        } catch (e) {
            console.error('Failed to load custom tools:', e);
        }
    }

    function showCustomToolForm(editData) {
        const container = document.getElementById('custom-tool-form-container');
        const isEdit = !!editData;
        const params = editData ? editData.parameters : [];
        const paramRows = params.map((p, i) => buildParamRowHTML(i, p)).join('');

        container.innerHTML = `<div class="custom-tool-form">
            <label>Name (lowercase, underscores only)</label>
            <input type="text" id="ct-name" placeholder="e.g. word_count" value="${editData ? escHtml(editData.name) : ''}" ${isEdit ? 'readonly style="opacity:0.6"' : ''}>
            <label>Description</label>
            <input type="text" id="ct-desc" placeholder="What this tool does" value="${editData ? escHtml(editData.description) : ''}">

            <label>Parameters</label>
            <div class="param-builder" id="ct-params">${paramRows}</div>
            <button class="btn-add-param" onclick="addParamRow()">+ Add Parameter</button>

            <label>Code (use print() for output; params are variables)</label>
            <textarea class="code-area" id="ct-code" placeholder="# Parameters are available as variables\n# e.g. if you have a 'text' parameter:\nprint(len(text.split()))">${editData ? escHtml(editData.code_body) : ''}</textarea>

            <div class="test-section">
                <div class="test-row">
                    <button class="btn-sm" onclick="testCustomTool()">Test</button>
                    <span style="font-size:0.72rem;color:var(--text-dim)">Runs code with sample values</span>
                </div>
                <div class="test-output" id="ct-test-output"></div>
            </div>

            <div class="custom-tool-form-actions">
                <button class="btn-sm" onclick="saveCustomTool(${editData ? editData.id : 'null'})">${isEdit ? 'Update' : 'Create'}</button>
                <button class="btn-sm danger" onclick="hideCustomToolForm()">Cancel</button>
            </div>
        </div>`;
    }

    function buildParamRowHTML(index, data) {
        const name = data ? data.name : '';
        const type = data ? data.type : 'string';
        const desc = data ? data.description : '';
        const req = data && data.required ? ' checked' : '';
        return `<div class="param-row">
            <input type="text" placeholder="name" class="ct-param-name" value="${escHtml(name)}">
            <select class="ct-param-type">
                <option value="string"${type === 'string' ? ' selected' : ''}>string</option>
                <option value="integer"${type === 'integer' ? ' selected' : ''}>integer</option>
                <option value="number"${type === 'number' ? ' selected' : ''}>number</option>
                <option value="boolean"${type === 'boolean' ? ' selected' : ''}>boolean</option>
            </select>
            <input type="text" placeholder="description" class="ct-param-desc" value="${escHtml(desc)}">
            <label class="param-required-label"><input type="checkbox" class="ct-param-req"${req}> Req</label>
            <button class="btn-remove-param" onclick="this.parentElement.remove()">&times;</button>
        </div>`;
    }

    function addParamRow() {
        const container = document.getElementById('ct-params');
        const div = document.createElement('div');
        div.innerHTML = buildParamRowHTML(container.children.length, null);
        container.appendChild(div.firstElementChild);
    }

    function getFormParams() {
        const rows = document.querySelectorAll('#ct-params .param-row');
        const params = [];
        rows.forEach(row => {
            const name = row.querySelector('.ct-param-name').value.trim();
            if (!name) return;
            params.push({
                name: name,
                type: row.querySelector('.ct-param-type').value,
                description: row.querySelector('.ct-param-desc').value.trim(),
                required: row.querySelector('.ct-param-req').checked,
            });
        });
        return params;
    }

    function hideCustomToolForm() {
        document.getElementById('custom-tool-form-container').innerHTML = '';
    }

    async function testCustomTool() {
        const code = document.getElementById('ct-code').value.trim();
        const params = getFormParams();
        if (!code) { alert('Enter code to test.'); return; }

        // Build sample params
        const sampleParams = {};
        params.forEach(p => {
            if (p.type === 'integer') sampleParams[p.name] = 0;
            else if (p.type === 'number') sampleParams[p.name] = 0.0;
            else if (p.type === 'boolean') sampleParams[p.name] = true;
            else sampleParams[p.name] = 'sample text';
        });

        const outputEl = document.getElementById('ct-test-output');
        outputEl.textContent = 'Running...';
        outputEl.classList.add('visible');

        try {
            const res = await fetch('/api/custom-tools/test', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code_body: code, params: sampleParams }),
            });
            const data = await res.json();
            if (!res.ok) {
                outputEl.textContent = 'Error: ' + (data.detail || 'Test failed');
            } else {
                outputEl.textContent = data.output;
            }
        } catch (e) {
            outputEl.textContent = 'Error: ' + e.message;
        }
    }

    async function saveCustomTool(editId) {
        const name = document.getElementById('ct-name').value.trim().toLowerCase();
        const description = document.getElementById('ct-desc').value.trim();
        const code_body = document.getElementById('ct-code').value.trim();
        const parameters = getFormParams();

        if (!name || !description || !code_body) {
            alert('Name, description, and code are required.');
            return;
        }

        try {
            const url = editId ? `/api/custom-tools/${editId}` : '/api/custom-tools';
            const method = editId ? 'PUT' : 'POST';
            const body = { name, description, parameters, code_body };
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                alert(err.detail || 'Failed to save tool');
                return;
            }
            hideCustomToolForm();
            loadCustomTools();
        } catch (e) {
            console.error('Failed to save custom tool:', e);
        }
    }

    async function editCustomTool(id) {
        try {
            const res = await fetch('/api/custom-tools');
            const data = await res.json();
            const tool = data.tools.find(t => t.id === id);
            if (tool) showCustomToolForm(tool);
        } catch (e) {
            console.error('Failed to load custom tool for edit:', e);
        }
    }

    async function toggleCustomTool(id, enabled) {
        try {
            await fetch(`/api/custom-tools/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled }),
            });
            loadCustomTools();
        } catch (e) {
            console.error('Failed to toggle custom tool:', e);
        }
    }

    async function deleteCustomTool(id) {
        if (!confirm('Delete this custom tool?')) return;
        try {
            await fetch(`/api/custom-tools/${id}`, { method: 'DELETE' });
            loadCustomTools();
        } catch (e) {
            console.error('Failed to delete custom tool:', e);
        }
    }

    // --- Import Tools ---

    function showImportForm() {
        const container = document.getElementById('import-form-container');
        container.innerHTML = `<div class="custom-tool-form">
            <label>Paste tool JSON (single object or array)</label>
            <textarea class="code-area" id="import-json" rows="6" placeholder='{"name": "word_count", "description": "Count words", "parameters": [{"name": "text", "type": "string", "description": "Input text", "required": true}], "code_body": "print(len(text.split()))"}'></textarea>
            <div class="import-divider">— or —</div>
            <label>Fetch from URL</label>
            <input type="text" id="import-url" placeholder="https://example.com/tools.json">
            <div id="import-result"></div>
            <div class="custom-tool-form-actions">
                <button class="btn-sm" onclick="submitImport()">Import</button>
                <button class="btn-sm danger" onclick="hideImportForm()">Cancel</button>
            </div>
        </div>`;
    }

    function hideImportForm() {
        document.getElementById('import-form-container').innerHTML = '';
    }

    async function submitImport() {
        const jsonText = document.getElementById('import-json').value.trim();
        const url = document.getElementById('import-url').value.trim();
        const resultEl = document.getElementById('import-result');

        if (!jsonText && !url) {
            resultEl.className = 'import-result error visible';
            resultEl.textContent = 'Paste JSON or enter a URL.';
            return;
        }

        const body = jsonText ? { json: jsonText } : { url: url };
        resultEl.className = 'import-result visible';
        resultEl.textContent = 'Importing...';

        try {
            const res = await fetch('/api/custom-tools/import', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            const data = await res.json();
            if (!res.ok) {
                resultEl.className = 'import-result error visible';
                resultEl.textContent = data.detail || 'Import failed';
                return;
            }
            let msg = `Imported: ${data.imported.join(', ')}`;
            if (data.errors && data.errors.length > 0) {
                msg += `\nErrors: ${data.errors.join('; ')}`;
            }
            resultEl.className = 'import-result success visible';
            resultEl.textContent = msg;
            loadCustomTools();
        } catch (e) {
            resultEl.className = 'import-result error visible';
            resultEl.textContent = 'Error: ' + e.message;
        }
    }

    // --- Custom Commands ---

    async function loadCommands() {
        try {
            const res = await fetch('/api/commands');
            const data = await res.json();
            const list = document.getElementById('commands-list');
            if (!data.commands || data.commands.length === 0) {
                list.innerHTML = '<p style="color:var(--text-dim);font-size:0.85rem;">No custom commands yet.</p>';
                return;
            }
            list.innerHTML = data.commands.map(c => `<div class="cmd-card">
                <div class="cmd-card-header">
                    <span class="cmd-name">/${escHtml(c.name)}</span>
                    <div class="cmd-actions">
                        <button class="btn-xs" onclick="useCommand(${c.id}, '${escHtml(c.name)}', \`${escHtml(c.prompt_template)}\`)">Use</button>
                        <button class="btn-xs" onclick="editCommand(${c.id})">Edit</button>
                        <button class="btn-xs" onclick="deleteCommand(${c.id})">Del</button>
                    </div>
                </div>
                ${c.description ? '<div class="cmd-desc">' + escHtml(c.description) + '</div>' : ''}
                <div class="cmd-template">${escHtml(c.prompt_template)}</div>
            </div>`).join('');
        } catch (e) {
            console.error('Failed to load commands:', e);
        }
    }

    function showCommandForm(editData) {
        const container = document.getElementById('command-form-container');
        const isEdit = !!editData;
        container.innerHTML = `<div class="cmd-form">
            <label>Name (no spaces)</label>
            <input type="text" id="cmd-name" placeholder="e.g. summarize" value="${editData ? escHtml(editData.name) : ''}">
            <label>Description</label>
            <input type="text" id="cmd-desc" placeholder="What this command does" value="${editData ? escHtml(editData.description) : ''}">
            <label>Prompt Template (use {input} for user input)</label>
            <textarea id="cmd-template" placeholder="e.g. Summarize this: {input}">${editData ? escHtml(editData.prompt_template) : ''}</textarea>
            <div class="cmd-form-actions">
                <button class="btn-sm" onclick="saveCommand(${editData ? editData.id : 'null'})">${isEdit ? 'Update' : 'Create'}</button>
                <button class="btn-sm danger" onclick="hideCommandForm()">Cancel</button>
            </div>
        </div>`;
    }

    function hideCommandForm() {
        document.getElementById('command-form-container').innerHTML = '';
    }

    async function saveCommand(editId) {
        const name = document.getElementById('cmd-name').value.trim();
        const description = document.getElementById('cmd-desc').value.trim();
        const prompt_template = document.getElementById('cmd-template').value.trim();

        if (!name || !prompt_template) {
            alert('Name and prompt template are required.');
            return;
        }

        try {
            const url = editId ? `/api/commands/${editId}` : '/api/commands';
            const method = editId ? 'PUT' : 'POST';
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, description, prompt_template }),
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                alert(err.detail || 'Failed to save command');
                return;
            }
            hideCommandForm();
            loadCommands();
        } catch (e) {
            console.error('Failed to save command:', e);
        }
    }

    async function editCommand(id) {
        try {
            const res = await fetch('/api/commands');
            const data = await res.json();
            const cmd = data.commands.find(c => c.id === id);
            if (cmd) showCommandForm(cmd);
        } catch (e) {
            console.error('Failed to load command for edit:', e);
        }
    }

    async function deleteCommand(id) {
        if (!confirm('Delete this command?')) return;
        try {
            await fetch(`/api/commands/${id}`, { method: 'DELETE' });
            loadCommands();
        } catch (e) {
            console.error('Failed to delete command:', e);
        }
    }

    function useCommand(id, name, template) {
        if (template.includes('{input}')) {
            messageInput.value = `/${name} `;
            messageInput.focus();
        } else {
            messageInput.value = `/${name}`;
            sendMessage();
        }
    }

    // Init
    loadHistory();
    refreshSidebar();

    // Auto-refresh sidebar every 30s
    setInterval(refreshSidebar, 30000);
</script>

</body>
</html>
